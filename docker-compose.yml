services:
  postgres:
    image: postgres:16-alpine
    container_name: eventiqn-postgres
    environment:
      POSTGRES_USER: eventiqn
      POSTGRES_PASSWORD: eventiqn
      POSTGRES_DB: eventiqn
    ports:
      - "5433:5432"
    volumes:
      - eventiqn_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventiqn -d eventiqn"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: eventiqn-redis
    ports:
      - "6380:6379"
    volumes:
      - eventiqn_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s

volumes:
  eventiqn_pgdata:
  eventiqn_redisdata:
