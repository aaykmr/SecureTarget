# EventIQN API — nginx reverse proxy (dedicated nginx EC2)
# Proxies public HTTPS to the Node backend on the **app EC2 private IP**.
#
# 1. Replace APP_PRIVATE_IP with your app EC2 private IP (e.g. 10.0.1.20)
# 2. server_name / cert paths use api.eventiqn.trusttargets.com
#
# Install:
#   sudo cp securetarget-api.conf /etc/nginx/sites-available/securetarget-api
#   sudo ln -sf /etc/nginx/sites-available/securetarget-api /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (after DNS A record → nginx Elastic IP):
#   sudo certbot --nginx -d api.eventiqn.trusttargets.com

upstream securetarget_backend {
    # App EC2 private IP — edit before deploy
    server 10.0.1.20:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.eventiqn.trusttargets.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.eventiqn.trusttargets.com;

    ssl_certificate     /etc/letsencrypt/live/api.eventiqn.trusttargets.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.eventiqn.trusttargets.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2m;

    location / {
        proxy_pass http://securetarget_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
