name: Deploy TrustTargets site

on:
  push:
    branches:
      - master
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: deploy-site-production
  cancel-in-progress: true

env:
  S3_BUCKET: prod-trust-targets-site
  CLOUDFRONT_DOMAIN: dx147udzajhfp.cloudfront.net

jobs:
  deploy:
    name: Build and deploy to S3
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci -w @eventiqn/site --include-workspace-root

      - name: Build site
        run: npm run build --workspace @eventiqn/site
        env:
          VITE_GOOGLE_SHEETS_SCRIPT_URL: ${{ secrets.VITE_GOOGLE_SHEETS_SCRIPT_URL }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync static assets to S3
        run: |
          aws s3 sync site/dist "s3://${S3_BUCKET}" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.html" \
            --exclude "site.webmanifest" \
            --exclude "README.md"

      - name: Sync HTML and manifest to S3
        run: |
          aws s3 sync site/dist "s3://${S3_BUCKET}" \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "index.html" \
            --include "*.html" \
            --include "site.webmanifest"

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          if [ -z "$DIST_ID" ]; then
            DIST_ID=$(aws cloudfront list-distributions \
              --query "DistributionList.Items[?DomainName=='${CLOUDFRONT_DOMAIN}'].Id | [0]" \
              --output text)
          fi
          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            echo "CloudFront distribution not found for ${CLOUDFRONT_DOMAIN}"
            exit 1
          fi
          echo "Invalidating distribution ${DIST_ID}"
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"
