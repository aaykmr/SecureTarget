name: Deploy EventIQN backend

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/deploy-backend-remote.sh"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to app EC2
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy over SSH (via nginx jump host)
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_DEPLOY_PATH: ${{ vars.BACKEND_DEPLOY_PATH || '/home/ubuntu/SecureTarget' }}
          BACKEND_DEPLOY_BRANCH: ${{ vars.BACKEND_DEPLOY_BRANCH || 'master' }}
          BACKEND_SYSTEMD_SERVICE: ${{ vars.BACKEND_SYSTEMD_SERVICE || 'securetarget-backend' }}
        with:
          host: ${{ secrets.BACKEND_EC2_HOST }}
          username: ${{ secrets.BACKEND_EC2_USER }}
          key: ${{ secrets.BACKEND_EC2_SSH_KEY }}
          port: ${{ secrets.BACKEND_EC2_SSH_PORT || 22 }}
          proxy_host: ${{ secrets.BACKEND_PROXY_HOST }}
          proxy_username: ${{ secrets.BACKEND_PROXY_USER }}
          proxy_key: ${{ secrets.BACKEND_PROXY_KEY }}
          proxy_port: ${{ secrets.BACKEND_PROXY_PORT || 22 }}
          script_stop: true
          envs: BACKEND_DEPLOY_PATH,BACKEND_DEPLOY_BRANCH,BACKEND_SYSTEMD_SERVICE
          script: |
            set -euo pipefail
            bash "${BACKEND_DEPLOY_PATH}/scripts/deploy-backend-remote.sh"
