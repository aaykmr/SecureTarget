name: Deploy SecureTarget web

on:
  push:
    branches:
      - master
    paths:
      - "web/**"
      - "packages/**"
      - "sdk/web/**"
      - "scripts/build-sdk-zips.mjs"
      - ".github/workflows/deploy-web.yml"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: deploy-web-production
  cancel-in-progress: true

env:
  S3_BUCKET: ${{ secrets.WEB_S3_BUCKET }}
  CLOUDFRONT_DOMAIN: ${{ secrets.WEB_CLOUDFRONT_DOMAIN }}

jobs:
  deploy:
    name: Build and deploy SPA to S3
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci -w web --include-workspace-root

      - name: Build web
        run: npm run build --workspace web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_INGEST_URL: ${{ secrets.VITE_INGEST_URL }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync static assets to S3
        run: |
          aws s3 sync web/dist "s3://${S3_BUCKET}" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.html" \
            --exclude "sdk.js" \
            --exclude "downloads/*"

      - name: Sync HTML, SDK, and downloads to S3
        run: |
          aws s3 sync web/dist "s3://${S3_BUCKET}" \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "index.html" \
            --include "*.html"
          aws s3 sync web/dist "s3://${S3_BUCKET}" \
            --cache-control "public, max-age=3600" \
            --exclude "*" \
            --include "sdk.js" \
            --include "downloads/*"

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID="${{ secrets.WEB_CLOUDFRONT_DISTRIBUTION_ID }}"
          if [ -z "$DIST_ID" ]; then
            DIST_ID=$(aws cloudfront list-distributions \
              --query "DistributionList.Items[?DomainName=='${CLOUDFRONT_DOMAIN}'].Id | [0]" \
              --output text)
          fi
          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            echo "CloudFront distribution not found for ${CLOUDFRONT_DOMAIN}"
            exit 1
          fi
          echo "Invalidating distribution ${DIST_ID}"
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"
