<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventIQN — AI-ready measurement across every digital touchpoint</title>
    <meta
      name="description"
      content="Deliver the right signals with AI-ready infrastructure and mobile-grade measurement across apps, web, CTV, PC, console, and beyond."
    />
    <meta name="theme-color" content="#1877f2" />
    <link rel="canonical" href="https://eventiqn.trusttargets.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="EventIQN" />
    <meta property="og:url" content="https://eventiqn.trusttargets.com/" />
    <meta property="og:title" content="EventIQN — AI-ready measurement across every digital touchpoint" />
    <meta
      property="og:description"
      content="Deliver the right signals with AI-ready infrastructure and mobile-grade measurement across apps, web, CTV, PC, console, and beyond."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EventIQN — AI-ready measurement across every digital touchpoint" />
    <meta
      name="twitter:description"
      content="Fuel smarter decisions and faster growth with AI-ready data infrastructure and mobile-grade measurement across every digital touchpoint."
    />

    <link
      rel="preload"
      href="/fonts/inter-latin-wght-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <style>
      @font-face {
        font-family: "Inter Variable";
        font-style: normal;
        font-display: swap;
        font-weight: 100 900;
        src: url("/fonts/inter-latin-wght-normal.woff2") format("woff2-variations");
      }
      :root {
        --font-sans: "Inter Variable", Inter, ui-sans-serif, system-ui, sans-serif;
        --font-mono: "IBM Plex Mono", ui-monospace, monospace;
      }
      /* Immediate paint before the JS bundle (landing is always light). */
      html,
      body {
        margin: 0;
        background: #f6f8fb;
        color: #0f172a;
        font-family: var(--font-sans);
      }
      #root-shell {
        box-sizing: border-box;
        min-height: 100dvh;
        padding: 5.5rem 1.5rem 2rem;
        max-width: 72rem;
        margin: 0 auto;
      }
      #root-shell .brand {
        margin: 0 0 1rem;
        font-size: clamp(1.5rem, 4vw, 2.25rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        color: #1877f2;
        line-height: 1.1;
      }
      #root-shell h1 {
        margin: 0;
        font-size: clamp(2.25rem, 7.5vw + 0.5rem, 5.5rem);
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1.05;
        color: #0f172a;
      }
      #root-shell h1 span {
        color: #1877f2;
      }
      #root-shell .lead {
        margin: 1.25rem 0 0;
        max-width: 36rem;
        font-size: clamp(1.125rem, 1.5vw + 0.5rem, 1.625rem);
        line-height: 1.45;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Replaced by React; provides FCP/LCP candidates before JS loads. -->
      <div id="root-shell">
        <p class="brand">EventIQN</p>
        <h1>Deliver the right <span>signals</span></h1>
        <p class="lead">
          AI-ready infrastructure and mobile-grade measurement across every digital touchpoint—from apps and web to
          CTV, PC, console, and beyond.
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
